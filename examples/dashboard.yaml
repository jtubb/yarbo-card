# Minimal usage
type: custom:yarbo-card
prefix: my_robot

# ---

# With map panel alongside
type: vertical-stack
cards:
  - type: custom:yarbo-card
    prefix: my_robot
  - type: map
    entities:
      - device_tracker.my_robot_location
    default_zoom: 19
    hours_to_show: 1

# ---

# Compact + no advanced section
type: custom:yarbo-card
prefix: my_robot
compact: true
show_advanced: false
name: Driveway Snow Robot
